<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gymzyn Moto Parts</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
        
        /* Navigation Bar */
        .navbar { display: flex; justify-content: space-between; align-items: center; background: #222; color: white; padding: 15px 40px; }
        .navbar h2 { margin: 0; font-size: 22px; }
        .nav-links a { color: white; text-decoration: none; margin-left: 20px; font-weight: bold; font-size: 16px; }
        .nav-links a.login-btn { background: #ffaa00; padding: 8px 15px; border-radius: 4px; color: black; }

        /* Main Content Box - Nilagay na sa Itaas */
        .content-box { width: 95%; max-width: 1300px; margin: 25px auto 15px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; box-sizing: border-box; }
        .content-box h2 { font-size: 28px; color: #222; margin-top: 0; }
        .content-box p { font-size: 16px; color: #555; margin-bottom: 0; }

        /* Slider Container */
        .slider-container { width: 95%; max-width: 1300px; height: 550px; position: relative; margin: 0 auto 40px auto; overflow: hidden; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); background: #000; }
        
        .slide { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            opacity: 0; 
            transition: opacity 2s ease-in-out; 
            top: 0;
            left: 0;
        }
        
        .slide.active { 
            opacity: 1; 
        }

        /* Next and Prev buttons */
        .prev, .next { cursor: pointer; position: absolute; top: 50%; transform: translateY(-50%); padding: 15px; color: white; font-weight: bold; font-size: 22px; background: rgba(0,0,0,0.6); border-radius: 50%; border: none; z-index: 10; }
        .prev { left: 20px; }
        .next { right: 20px; }
        .prev:hover, .next:hover { background: rgba(0,0,0,0.9); }
    </style>
</head>
<body>

    <div class="navbar">
        <h2>Gymzyn Moto Parts</h2>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="product.html">Product</a>
            <a href="admin.html" class="login-btn">Admin Login</a>
        </div>
    </div>

    <!-- Welcome Content Box (Nasa Ibabaw na ngayon) -->
    <div class="content-box">
        <h2>Maligayang Pagdating sa Gymzyn Moto Parts</h2>
        <p>Ito ang opisyal na pahina ng ating tindahan para sa mga de-kalidad na piyesa ng motor.</p>
    </div>

    <!-- Image Slider / Carousel Section (Nasa Baba na ng text box) -->
    <div class="slider-container">
        <img class="slide active" src="https://images.unsplash.com/photo-1558981806-ec527fa84c39?w=1300" alt="Motorcycle Parts 1">
        <img class="slide" src="https://images.unsplash.com/photo-1568772585407-9361f9bf3a87?w=1300" alt="Motorcycle Parts 2">
        <img class="slide" src="https://images.unsplash.com/photo-1526738549149-8e07eca6c147?w=1300" alt="Motorcycle Parts 3">

        <button class="prev" onclick="changeSlide(-1)">&#10094;</button>
        <button class="next" onclick="changeSlide(1)">&#10095;</button>
    </div>

    <script>
        let slideIndex = 0;
        let slideTimer = setInterval(autoSlide, 5000);

        function showSlide(n) {
            let slides = document.getElementsByClassName("slide");
            if (n >= slides.length) { slideIndex = 0; }
            if (n < 0) { slideIndex = slides.length - 1; }
            
            for (let i = 0; i < slides.length; i++) {
                slides[i].classList.remove("active");
            }
            slides[slideIndex].classList.add("active");
        }

        function changeSlide(n) {
            clearInterval(slideTimer);
            slideIndex += n;
            showSlide(slideIndex);
            slideTimer = setInterval(autoSlide, 5000);
        }

        function autoSlide() {
            slideIndex++;
            showSlide(slideIndex);
        }
    </script>
</body>
</html>
