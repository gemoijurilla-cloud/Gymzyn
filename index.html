<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gymzyn Moto Parts</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
        
        /* Navigation Bar */
        .navbar { display: flex; justify-content: space-between; align-items: center; background: #222; color: white; padding: 15px 40px; }
        .navbar h2 { margin: 0; font-size: 22px; }
        .nav-links a { color: white; text-decoration: none; margin-left: 20px; font-weight: bold; font-size: 16px; }
        .nav-links a.login-btn { background: #ffaa00; padding: 8px 15px; border-radius: 4px; color: black; }

        /* Main Content Box */
        .content-box { width: 95%; max-width: 1300px; margin: 25px auto 15px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; box-sizing: border-box; }
        .content-box h2 { font-size: 28px; color: #222; margin-top: 0; }
        .content-box p { font-size: 16px; color: #555; margin-bottom: 0; }

        /* Slider Container */
        .slider-container { width: 95%; max-width: 1300px; height: 550px; position: relative; margin: 0 auto 40px auto; overflow: hidden; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); background: #000; }
        
        .slide { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            opacity: 0; 
            transition: opacity 2s ease-in-out; 
            top: 0;
            left: 0;
        }
        
        .slide.active { 
            opacity: 1; 
        }

        /* Next and Prev buttons */
        .prev, .next { cursor: pointer; position: absolute; top: 50%; transform: translateY(-50%); padding: 15px; color: white; font-weight: bold; font-size: 22px; background: rgba(0,0,0,0.6); border-radius: 50%; border: none; z-index: 10; }
        .prev { left: 20px; }
        .next { right: 20px; }
        .prev:hover, .next:hover { background: rgba(0,0,0,0.9); }

        /* Login Section Styling */
        .login-section {
            width: 90%;
            max-width: 400px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            text-align: center;
        }
        .login-section h1 { font-size: 22px; color: #222; margin-bottom: 10px; }
        .login-section p { font-size: 14px; color: #666; margin-bottom: 20px; }
        .login-section label { display: block; text-align: left; font-weight: bold; margin-bottom: 5px; color: #333; }
        .login-section input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .login-section .btn { width: 100%; padding: 10px; background: #ffaa00; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 16px; }
        .login-section .btn:hover { background: #e69900; }
        .error { color: red; margin-top: 10px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div class="navbar">
        <h2>Gymzyn Moto Parts</h2>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="product.html">Product</a>
            <!-- Pinalitan ang href sa #login para mag-scroll pababa papunta sa login box -->
            <a href="#login" class="login-btn">Admin Login</a>
        </div>
    </div>

    <!-- Welcome Content Box -->
    <div class="content-box">
        <h2>Maligayang Pagdating sa Gymzyn Moto Parts</h2>
        <p>Ito ang opisyal na pahina ng ating tindahan para sa mga de-kalidad na piyesa ng motor.</p>
    </div>

    <!-- Image Slider Section -->
    <div class="slider-container">
        <img class="slide active" src="https://images.unsplash.com/photo-1558981806-ec527fa84c39?w=1300" alt="Motorcycle Parts 1">
        <img class="slide" src="https://images.unsplash.com/photo-1568772585407-9361f9bf3a87?w=1300" alt="Motorcycle Parts 2">
        <img class="slide" src="https://images.unsplash.com/photo-1526738549149-8e07eca6c147?w=1300" alt="Motorcycle Parts 3">

        <button class="prev" onclick="changeSlide(-1)">&#10094;</button>
        <button class="next" onclick="changeSlide(1)">&#10095;</button>
    </div>
    <!-- LOGIN SECTION -->
    <div id="login" class="login-section">
        <h1>Seller Login</h1>
        <p>Ilagay ang iyong admin credentials para makapasok sa dashboard.</p>
        
        <label for="username">Username:</label>
        <input type="text" id="username" placeholder="Username" required>
        
        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Password" required>
        
        <button class="btn" onclick="validateLogin()">OK</button>
        <div id="errorMsg" class="error"></div>
    </div>
    <script>
        // Image Slider Script
        let slideIndex = 0;
        let slideTimer = setInterval(autoSlide, 5000);

        function showSlide(n) {
            let slides = document.getElementsByClassName("slide");
            if (n >= slides.length) { slideIndex = 0; }
            if (n < 0) { slideIndex = slides.length - 1; }
            
            for (let i = 0; i < slides.length; i++) {
                slides[i].classList.remove("active");
            }
            slides[slideIndex].classList.add("active");
        }

        function changeSlide(n) {
            clearInterval(slideTimer);
            slideIndex += n;
            showSlide(slideIndex);
            slideTimer = setInterval(autoSlide, 5000);
        }

        function autoSlide() {
            slideIndex++;
            showSlide(slideIndex);
        }

        // Login Validation Function
        function validateLogin() {
            let user = document.getElementById('username').value;
            let pass = document.getElementById('password').value;

            // Credentials at target page
            let correctUser = "12345";       
            let correctPass = "12345";   
            let dashboardPath = "admin.html"; 

            if (user === correctUser && pass === correctPass) {
                // Ipapadala sa admin.html kapag tama
                window.location.href = dashboardPath;
            } else {
                // Magpapakita ng error message kapag mali
                document.getElementById('errorMsg').innerText = "Mali ang username o password!";
            }
        }
    </script>
</body>
</html>
