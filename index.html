<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gymzyn Moto Parts</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
        
        /* Navigation Bar */
        .navbar { display: flex; justify-content: space-between; align-items: center; background: #222; color: white; padding: 15px 30px; }
        .navbar h2 { margin: 0; font-size: 20px; }
        .nav-links a { color: white; text-decoration: none; margin-left: 20px; font-weight: bold; }
        .nav-links a.login-btn { background: #ffaa00; padding: 8px 15px; border-radius: 4px; color: black; }

        /* Slider Container Styles */
        .slider-container { max-width: 800px; position: relative; margin: 30px auto; overflow: hidden; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); background: #000; }
        
        .slide { 
            position: absolute; 
            width: 100%; 
            height: 400px; 
            object-fit: cover; 
            opacity: 0; 
            transition: opacity 2s ease-in-out; /* Dito inayos para maging Slomo Fade (2 seconds) */
            top: 0;
            left: 0;
        }
        
        .slide.active { 
            opacity: 1; 
            position: relative; /* Para sumunod ang taas ng container sa image */
        }

        /* Next and Prev buttons */
        .prev, .next { cursor: pointer; position: absolute; top: 50%; transform: translateY(-50%); padding: 12px; color: white; font-weight: bold; font-size: 18px; background: rgba(0,0,0,0.5); border-radius: 50%; border: none; z-index: 10; }
        .prev { left: 10px; }
        .next { right: 10px; }
        .prev:hover, .next:hover { background: rgba(0,0,0,0.8); }

        /* Main Content Box */
        .content-box { max-width: 800px; margin: 20px auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
    </style>
</head>
<body>

    <div class="navbar">
        <h2>Gymzyn Moto Parts</h2>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="product.html">Product</a>
            <a href="admin.html" class="login-btn">Admin Login</a>
        </div>
    </div>

    <!-- Image Slider / Carousel Section -->
    <div class="slider-container">
        <img class="slide active" src="https://github.com/gemoijurilla-cloud/Parts/blob/main/Folder/Castrol%20Go.jpg" alt="Motorcycle Parts 1">
        <img class="slide" src="https://github.com/gemoijurilla-cloud/Parts/blob/main/Folder/Bearing.jpg" alt="Motorcycle Parts 2">
        <img class="slide" src="https://github.com/gemoijurilla-cloud/Gymzyn/blob/main/handleswitch.jpg" alt="Motorcycle Parts 3">

        <button class="prev" onclick="changeSlide(-1)">&#10094;</button>
        <button class="next" onclick="changeSlide(1)">&#10095;</button>
    </div>

    <div class="content-box">
        <h2>Maligayang Pagdating sa Gymzyn Moto Parts</h2>
        <p>Ito ang opisyal na pahina ng ating tindahan para sa mga de-kalidad na piyesa ng motor.</p>
    </div>

    <script>
        let slideIndex = 0;
        let slideTimer = setInterval(autoSlide, 5000); // Lilipat ang slide kada 5 segundo para may sapat na oras ang slomo fade

        function showSlide(n) {
            let slides = document.getElementsByClassName("slide");
            if (n >= slides.length) { slideIndex = 0; }
            if (n < 0) { slideIndex = slides.length - 1; }
            
            for (let i = 0; i < slides.length; i++) {
                slides[i].classList.remove("active");
            }
            slides[slideIndex].classList.add("active");
        }

        function changeSlide(n) {
            clearInterval(slideTimer); // I-reset ang timer pag pinindot ang arrow
            slideIndex += n;
            showSlide(slideIndex);
            slideTimer = setInterval(autoSlide, 5000);
        }

        function autoSlide() {
            slideIndex++;
            showSlide(slideIndex);
        }
    </script>
</body>
</html>
