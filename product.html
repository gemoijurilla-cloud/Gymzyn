<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Catalog - Gymzyn Store</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; }
        nav { text-align: center; margin-bottom: 25px; position: relative; }
        nav a { margin: 0 10px; text-decoration: none; font-size: 16px; color: blue; font-weight: bold; }
        
        /* Floating Cart Button sa taas */
        .cart-icon-btn { position: absolute; right: 20px; top: -5px; background: #ff9800; color: white; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        .container { max-width: 800px; margin: 0 auto; }
        
        /* Product Item Card */
        .product-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 25px; text-align: center; }
        .product-card img { width: 180px; height: 180px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 10px; }
        .product-price { font-size: 22px; font-weight: bold; color: #d9534f; margin: 8px 0; }
        .wholesale-badge { background: #fff3cd; color: #856404; padding: 6px; border-radius: 4px; font-size: 13px; margin-bottom: 12px; border: 1px solid #ffeeba; text-align: left; display: inline-block; width: 100%; box-sizing: border-box; }
        
        .action-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 14px; text-align: center; color: white; }
        .btn-chat { background-color: #008CBA; }
        .btn-cart { background-color: #ff9800; }
        .btn-buy { background-color: #4CAF50; }
        
        /* Interactive Panels (Cart & Buy) */
        .panel { margin-top: 15px; padding: 15px; border-radius: 5px; text-align: left; display: none; border: 1px solid #ddd; background: #fafafa; }
        .panel h4 { margin-top: 0; font-size: 15px; }
        
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; }
        input, select, textarea { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 13px; }
        
        .summary { background: #fff; padding: 10px; border-radius: 4px; margin-top: 10px; border: 1px solid #eee; }
        .summary p { margin: 4px 0; font-size: 14px; }
        .total-price { font-size: 16px; font-weight: bold; color: #d9534f; }
        
        /* Cart Drawer Modal Styling */
        .cart-modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .cart-content { background-color: #fefefe; margin: 10% auto; padding: 20px; border: 1px solid #888; width: 90%; max-width: 500px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); position: relative; }
        .close-cart { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; line-height: 20px; }
        .close-cart:hover { color: black; }
        
        .cart-item-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; padding: 10px 0; font-size: 14px; }
        .remove-item-btn { background: #d9534f; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }

        .back-btn { display: inline-block; margin-top: 10px; padding: 8px 15px; background-color: #333; color: white; text-decoration: none; border-radius: 5px; font-size: 14px; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="product.html">Product</a>
        <a href="contact.html">Contact</a>
        <button type="button" class="cart-icon-btn" onclick="openCartDrawer()">🛒 Cart (<span id="cart-count">0</span>)</button>
    </nav>

    <!-- CART DRAWER / MODAL -->
    <div id="cartDrawerModal" class="cart-modal">
        <div class="cart-content">
            <span class="close-cart" onclick="closeCartDrawer()">&times;</span>
            <h3 style="margin-top: 0; color: #ff9800;">Ang iyong Shopping Cart</h3>
            <div id="cart-items-container" style="max-height: 250px; overflow-y: auto; margin-bottom: 15px;">
                <!-- Dito papasok ang mga in-add to cart items -->
            </div>
            <div style="font-weight: bold; text-align: right; font-size: 16px; margin-bottom: 15px;">
                Kabuuang Halaga: ₱<span id="cart-total-amount">0.00</span>
            </div>
            <button type="button" class="btn btn-buy" style="width: 100%; font-size: 15px;" onclick="checkoutCartItems()">
                Mag-checkout mula sa Cart
            </button>
        </div>
    </div>

    <div class="container" id="store-container">
        <h2 style="text-align: center; margin-bottom: 20px;">Lahat ng Produkto</h2>
        <p style="text-align: center; color: #666;">Pumili at mamili sa aming mga produkto sa ibaba.</p>
    </div>

    <div style="text-align: center; margin-bottom: 30px;">
        <a href="index.html" class="back-btn">&larr; Back to Home</a>
    </div>

    <!-- JavaScript Store at Cart Logic -->
    <script>
        let productsList = [];
        let discountRates = {};

        async function loadStoreProducts() {
            try {
                const response = await fetch("products.json");
                if (!response.ok) throw new Error("Hindi mabasa ang JSON file.");
                productsList = await response.json();
                renderCatalog();
                updateCartBadge();
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('store-container').innerHTML = "<p style='text-align:center; color:red;'>Hindi ma-load ang mga produkto mula sa GitHub.</p>";
            }
        }

        function renderCatalog() {
            const container = document.getElementById('store-container');
            let htmlContent = `<h2 style="text-align: center; margin-bottom: 20px;">Lahat ng Produkto</h2>`;

            productsList.forEach((product, index) => {
                const basePrice = product.variations && product.variations.length > 0 ? product.variations[0].price : 0;
                
                let varOptionsHtml = "";
                if(product.variations) {
                    product.variations.forEach(v => {
                        varOptionsHtml += `<option value="${v.price}">${v.name} - ₱${v.price.toFixed(2)}</option>`;
                    });
                }

                htmlContent += `
                    <div class="product-card" id="product-${index}">
                        <img src="${product.image || ''}" alt="${product.name}" onerror="this.style.display='none'">
                        <h3>${product.name}</h3>
                        <div class="product-price">₱<span id="price-view-${index}">${basePrice.toFixed(2)}</span></div>
                        <p style="color: #666; font-size: 14px; text-align: left;">${product.desc}</p>
                        
                        ${product.wholesale ? `<div class="wholesale-badge">${product.wholesale}</div>` : ''}

                        <div class="action-buttons">
                            <button type="button" class="btn btn-chat" onclick="openChat('${product.name}')">Chat</button>
                            <button type="button" class="btn btn-cart" onclick="togglePanel(${index}, 'cart')">Add to Cart</button>
                            <button type="button" class="btn btn-buy" onclick="togglePanel(${index}, 'buy')">Buy Now</button>
                        </div>

                        <!-- 1. ADD TO CART PANEL -->
                        <div id="cart-panel-${index}" class="panel" style="border-color: #ff9800;">
                            <h4 style="color: #ff9800;">Add to Cart - Piliin ang Uri</h4>
                            <label>Sukat / Uri:</label>
                            <select id="cart-var-${index}" onchange="updateCartItemPrice(${index})">
                                ${varOptionsHtml}
                            </select>
                            <p style="font-weight: bold; margin: 8px 0;">Presyo: ₱<span id="cart-price-${index}">${basePrice.toFixed(2)}</span></p>
                            <button type="button" class="btn btn-cart" style="width:100%; margin-top:5px;" onclick="confirmAddToCart(${index})">
                                I-confirm at Ilagay sa Cart
                            </button>
                        </div>

                        <!-- 2. BUY NOW / CHECKOUT PANEL -->
                        <div id="buy-panel-${index}" class="panel" style="border-color: #4CAF50;">
                            <h4 style="color: #4CAF50;">Buy Now - Checkout Process</h4>
                            <form id="checkout-form-${index}" onsubmit="processCheckout(event, ${index}, '${product.voucher || "DISCOUNT10"}')">
                                <label>Piliin ang Sukat / Uri:</label>
                                <select id="buy-var-${index}" onchange="updateBuyItemPrice(${index}, '${product.voucher || "DISCOUNT10"}')">
                                    ${varOptionsHtml}
                                </select>

                                <div style="margin-top: 10px; border-top: 1px dashed #ddd; padding-top: 10px;">
                                    <label>Buong Pangalan:</label>
                                    <input type="text" id="name-${index}" placeholder="Juan Dela Cruz" required>
                                    
                                    <label>Kumpletong Address:</label>
                                    <textarea id="address-${index}" rows="2" placeholder="Street, Barangay, City, Province" required></textarea>
                                    
                                    <label>Numero ng Telepono:</label>
                                    <input type="tel" id="phone-${index}" placeholder="09123456789" required>
                                </div>

                                <label>Courier at Shipping Fee:</label>
                                <select id="courier-${index}" onchange="computeTotal(${index}, '${product.voucher || "DISCOUNT10"}')">
                                    <option value="50">J&T Express (Standard - ₱50)</option>
                                    <option value="60">Flash Express (Express - ₱60)</option>
                                    <option value="100">Ninja Van (Same Day - ₱100)</option>
                                </select>

                                <label>Promo Voucher (10% Off kung higit sa ₱1,000):</label>
                                <div style="display: flex; gap: 5px;">
                                    <input type="text" id="voucher-${index}" placeholder="Voucher Code" style="margin-bottom:0;">
                                    <button type="button" onclick="applyVoucher(${index}, '${product.voucher || "DISCOUNT10"}')" style="padding: 6px 10px; background: #007BFF; color: white; border: none; border-radius: 4px; cursor: pointer;">Apply</button>
                                </div>
                                <small id="voucher-msg-${index}" style="display: block; margin-top: 4px;"></small>

                                <label style="margin-top: 8px;">Payment Method:</label>
                                <select id="payment-${index}">
                                    <option value="cod">Cash on Delivery (COD)</option>
                                    <option value="gcash">GCash</option>
                                    <option value="maya">Maya</option>
                                    <option value="bank">Online Bank Transfer</option>
                                </select>

                                <div class="summary">
                                    <p>Presyo ng Sukat: ₱<span id="summary-price-${index}">${basePrice.toFixed(2)}</span></p>
                                    <p>Discount (10%): -₱<span id="summary-discount-${index}">0.00</span></p>
                                    <p>Shipping Fee: ₱<span id="summary-shipping-${index}">50.00</span></p>
                                    <p class="total-price">Kabuuang Babayaran: ₱<span id="summary-total-${index}">0.00</span></p>
                                </div>

                                <button type="submit" class="btn btn-buy" style="width:100%; margin-top:10px;">
                                    Place Order / Check-out Now
                                </button>
                            </form>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = htmlContent;

            productsList.forEach((_, index) => {
                computeTotal(index, productsList[index].voucher || "DISCOUNT10");
            });
        }

        function togglePanel(index, type) {
            const cartPanel = document.getElementById(`cart-panel-${index}`);
            const buyPanel = document.getElementById(`buy-panel-${index}`);

            if (type === 'cart') {
                cartPanel.style.display = cartPanel.style.display === 'block' ? 'none' : 'block';
                buyPanel.style.display = 'none';
            } else {
                buyPanel.style.display = buyPanel.style.display === 'block' ? 'none' : 'block';
                cartPanel.style.display = 'none';
            }
        }

        function openChat(productName) {
            alert(`Maaari kang mag-mensahe tungkol sa produktong "${productName}" sa pamamagitan ng aming Contact page.`);
        }

        function updateCartItemPrice(index) {
            const select = document.getElementById(`cart-var-${index}`);
            document.getElementById(`cart-price-${index}`).textContent = parseFloat(select.value).toFixed(2);
        }

        function updateBuyItemPrice(index, activeVoucherCode) {
            const select = document.getElementById(`buy-var-${index}`);
            const price = parseFloat(select.value);
            document.getElementById(`price-view-${index}`).textContent = price.toFixed(2);
            computeTotal(index, activeVoucherCode, true);
        }

        function confirmAddToCart(index) {
            const select = document.getElementById(`cart-var-${index}`);
            const selectedText = select.options[select.selectedIndex].text;
            const price = parseFloat(select.value);
            const productName = productsList[index].name;

            const cartItem = {
                product: productName,
                variation: selectedText,
                price: price,
                date: new Date().toISOString()
            };

            let cart = JSON.parse(localStorage.getItem('userCart')) || [];
            cart.push(cartItem);
            localStorage.setItem('userCart', JSON.stringify(cart));

            updateCartBadge();
            alert(`Matagumpay na naidagdag ang "${productName}" sa Cart! Pindutin ang Cart button sa itaas para makita.`);
            document.getElementById(`cart-panel-${index}`).style.display = 'none';
        }

        function updateCartBadge() {
            let cart = JSON.parse(localStorage.getItem('userCart')) || [];
            document.getElementById('cart-count').textContent = cart.length;
        }

        function openCartDrawer() {
            let cart = JSON.parse(localStorage.getItem('userCart')) || [];
            const container = document.getElementById('cart-items-container');
            let html = "";
            let total = 0;

            if (cart.length === 0) {
                html = "<p style='text-align:center; color:#666;'>Walang laman ang iyong cart.</p>";
            } else {
                cart.forEach((item, idx) => {
                    total += item.price;
                    html += `
                        <div class="cart-item-row">
                            <div>
                                <strong>${item.product}</strong><br>
                                <small style="color:#666;">${item.variation}</small><br>
                                <span style="color:#d9534f; font-weight:bold;">₱${item.price.toFixed(2)}</span>
                            </div>
                            <button type="button" class="remove-item-btn" onclick="removeCartItem(${idx})">Tanggalin</button>
                        </div>
                    `;
                });
            }

            container.innerHTML = html;
            document.getElementById('cart-total-amount').textContent = total.toFixed(2);
            document.getElementById('cartDrawerModal').style.display = "block";
        }

        function closeCartDrawer() {
            document.getElementById('cartDrawerModal').style.display = "none";
        }

        function removeCartItem(idx) {
            let cart = JSON.parse(localStorage.getItem('userCart')) || [];
            cart.splice(idx, 1);
            localStorage.setItem('userCart', JSON.stringify(cart));
            updateCartBadge();
            openCartDrawer(); // I-refresh ang modal list
        }

        function checkoutCartItems() {
            let cart = JSON.parse(localStorage.getItem('userCart')) || [];
            if (cart.length === 0) {
                alert("Walang laman ang cart para i-checkout.");
                return;
            }
            alert("Na-prproseso na ang mga produkto sa cart. (Maaari mong lagyan ng hiwalay na checkout form para sa kabuuang cart kung kinakailangan).");
            closeCartDrawer();
        }

        function applyVoucher(index, activeVoucherCode, isInternal = false) {
            const input = document.getElementById(`voucher-${index}`).value.trim().toUpperCase();
            const msg = document.getElementById(`voucher-msg-${index}`);
            const select = document.getElementById(`buy-var-${index}`);
            const currentPrice = parseFloat(select.value);

            if (!discountRates[index]) discountRates[index] = 0;

            if (!isInternal) {
                if (input === activeVoucherCode.toUpperCase()) {
                    if (currentPrice > 1000) {
                        discountRates[index] = 0.10;
                        msg.style.color = "green";
                        msg.textContent = "Tagumpay! 10% Discount ang nailapat.";
                    } else {
                        discountRates[index] = 0;
                        msg.style.color = "red";
                        msg.textContent = "Ang voucher ay para lamang sa mga bibilhing higit sa ₱1,000!";
                    }
                } else {
                    discountRates[index] = 0;
                    if(input !== "") {
                        msg.style.color = "red";
                        msg.textContent = "Maling voucher code!";
                    }
                }
            } else {
                if (discountRates[index] > 0 && currentPrice <= 1000) {
                    discountRates[index] = 0;
                    msg.style.color = "red";
                    msg.textContent = "Na-alis ang discount dahil ang halaga ay naging ₱1,000 pababa.";
                }
            }
            computeTotal(index, activeVoucherCode);
        }

        function computeTotal(index, activeVoucherCode, isPriceChange = false) {
            if (isPriceChange) {
                applyVoucher(index, activeVoucherCode, true);
            }

            const select = document.getElementById(`buy-var-${index}`);
            const price = parseFloat(select.value);
            const shipping = parseFloat(document.getElementById(`courier-${index}`).value);
            
            const rate = discountRates[index] || 0;
            const discountAmount = price * rate;
            const finalTotal = (price - discountAmount) + shipping;

            document.getElementById(`summary-price-${index}`).textContent = price.toFixed(2);
            document.getElementById(`summary-discount-${index}`).textContent = discountAmount.toFixed(2);
            document.getElementById(`summary-shipping-${index}`).textContent = shipping.toFixed(2);
            document.getElementById(`summary-total-${index}`).textContent = finalTotal.toFixed(2);
        }

        function processCheckout(e, index, activeVoucherCode) {
            e.preventDefault();
            const name = document.getElementById(`name-${index}`).value;
            const address = document.getElementById(`address-${index}`).value;
            const phone = document.getElementById(`phone-${index}`).value;
            const total = document.getElementById(`summary-total-${index}`).textContent;
            const payment = document.getElementById(`payment-${index}`).value.toUpperCase();
            const productName = productsList[index].name;

            if (!name || !address || !phone) {
                alert("Mangyaring punan ang lahat ng kinakailangang impormasyon sa Delivery Details.");
                return;
            }

            alert(`Maraming salamat sa iyong order, ${name}!\n\nProdukto: ${productName}\nKabuuang Babayaran: ₱${total}\nPayment Method: ${payment}\n\nAng iyong order ay matagumpay na naisumite!`);
        }

        // Patakbuhin sa pagsisimula
        loadStoreProducts();
    </script>

</body>
</html>
